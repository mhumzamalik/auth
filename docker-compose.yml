version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/auth?replicaSet=rs0
      - AUTH_SECRET=some-very-long-super-secret-auth-key-2026-stack
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }" --quiet
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
